<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>howlong</title>
<meta name="theme-color" content="#4f46e5">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="howlong">
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1c1c1e;
    --sub: #6b6b70;
    --border: #e2e2e6;
    --accent: #4f46e5;
    --accent-weak: #eceafe;
    --danger: #ef4444;
    --danger-weak: #fdeaea;
    --ok: #10b981;
    --shadow: 0 1px 3px rgba(0,0,0,.06);
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card: #1c1c1e;
      --text: #f2f2f7;
      --sub: #9a9aa0;
      --border: #38383c;
      --accent: #7c74ff;
      --accent-weak: #2a2840;
      --danger: #ff6b6b;
      --danger-weak: #3a2424;
      --ok: #34d399;
      --shadow: none;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 24px) env(safe-area-inset-left);
    max-width: 640px;
    margin: 0 auto;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  header h1 { font-size: 22px; margin: 0; letter-spacing: -.02em; }
  .header-actions { display: flex; gap: 8px; }
  button {
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    background: var(--accent);
    color: #fff;
    transition: opacity .15s, transform .05s;
  }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .4; cursor: default; }
  button.ghost { background: var(--accent-weak); color: var(--accent); }
  button.subtle { background: transparent; color: var(--sub); padding: 8px; font-size: 14px; }
  button.danger { background: var(--danger-weak); color: var(--danger); }
  button.icon { background: var(--accent-weak); color: var(--accent); padding: 9px 11px; font-size: 16px; }
  .main { padding: 0 16px; }

  /* running banner */
  #runningBanner {
    display: none;
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(env(safe-area-inset-bottom) + 12px);
    width: min(608px, calc(100% - 32px));
    box-sizing: border-box;
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius);
    padding: 14px 18px;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 8px 28px rgba(0,0,0,.32);
    z-index: 40;
  }
  #runningBanner.show { display: flex; }
  /* reserve space so the last card isn't hidden behind the fixed bar */
  body.running { padding-bottom: calc(env(safe-area-inset-bottom) + 116px); }
  #runningBanner .rb-name { font-weight: 600; font-size: 16px; }
  #runningBanner .rb-time { font-size: 30px; font-variant-numeric: tabular-nums; letter-spacing: .02em; font-weight: 300; }
  #runningBanner button { background: rgba(255,255,255,.22); color: #fff; }

  /* add activity */
  .add-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .add-row input {
    flex: 1;
    font-size: 16px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    color: var(--text);
  }
  input:focus, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  /* activity card */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .card-head .name { font-size: 18px; font-weight: 600; word-break: break-word; }
  .head-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .head-actions button { padding: 6px; font-size: 15px; }
  .planned { font-size: 13px; color: var(--sub); margin-top: 2px; }
  .planned b { color: var(--text); font-weight: 600; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 14px 0; }
  .stat { text-align: center; background: var(--bg); border-radius: 10px; padding: 8px 4px; }
  .stat .v { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stat .l { font-size: 11px; color: var(--sub); margin-top: 1px; }
  .stat.warn .v { color: var(--danger); }
  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .card-actions .start { flex: 1; min-width: 120px; }

  .history { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  .history[hidden] { display: none; }
  .rec {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .rec:last-child { border-bottom: none; }
  .rec .rec-main { font-size: 14px; }
  .rec .rec-date { color: var(--sub); font-size: 12px; }
  .rec .rec-min { font-weight: 600; font-variant-numeric: tabular-nums; }
  .rec-actions { display: flex; gap: 6px; }
  .rec-actions button { padding: 6px 9px; font-size: 13px; }
  .manual-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  .manual-row input { padding: 9px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; }
  .manual-row input.date { flex: 1; min-width: 130px; }
  .manual-row input.min { width: 70px; }

  .empty { text-align: center; color: var(--sub); padding: 40px 16px; font-size: 15px; }
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--bg); padding: 11px 18px; border-radius: 22px;
    font-size: 14px; opacity: 0; transition: .25s; pointer-events: none; z-index: 50; max-width: 90%;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .sr { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
  footer { text-align: center; margin: 32px 0 12px; }
  footer a {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--sub); font-size: 13px; text-decoration: none; opacity: .8;
  }
  footer a:hover { color: var(--accent); opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>howlong</h1>
  <div class="header-actions">
    <button class="icon" id="exportBtn" title="エクスポート">⬇ 書出</button>
    <button class="icon" id="importBtn" title="インポート">⬆ 取込</button>
    <input type="file" id="importFile" accept="application/json,.json" class="sr">
  </div>
</header>

<div class="main">
  <div id="runningBanner">
    <div>
      <div class="rb-name" id="rbName"></div>
      <div class="rb-time" id="rbTime">00:00</div>
    </div>
    <button id="stopBtn">終了</button>
  </div>

  <form class="add-row" id="addForm">
    <input type="text" id="addInput" placeholder="活動名を追加（例: 夕食）" maxlength="40" autocomplete="off">
    <button type="submit">追加</button>
  </form>

  <div id="list"></div>

  <footer>
    <a href="https://github.com/shifumin/howlong" target="_blank" rel="noopener noreferrer">
      <span aria-hidden="true">&lt;/&gt;</span> View on GitHub
    </a>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
